<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini RAG · ESN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --bg:         #0d0f18;
      --bg2:        #12151f;
      --surface:    #1b1e2e;
      --surface2:   #22263a;
      --border:     #2c3050;
      --accent:     #6c63ff;
      --accent-h:   #857dff;
      --accent-dim: rgba(108,99,255,.12);
      --danger:     #f55353;
      --danger-dim: rgba(245,83,83,.1);
      --success:    #3ecf8e;
      --text:       #e2e4f0;
      --text2:      #9da3be;
      --radius:     12px;
      --radius-sm:  8px;
      --sidebar-w:  320px;
      --header-h:   58px;
      --shadow:     0 4px 24px rgba(0,0,0,.4);
    }

    [data-theme="light"] {
      --bg:         #f4f5fb;
      --bg2:        #eceef8;
      --surface:    #ffffff;
      --surface2:   #f0f2fc;
      --border:     #d8daf0;
      --accent:     #5b52ee;
      --accent-h:   #7068f5;
      --accent-dim: rgba(91,82,238,.1);
      --danger:     #e03c3c;
      --danger-dim: rgba(224,60,60,.08);
      --success:    #1fa96d;
      --text:       #1a1d30;
      --text2:      #6b7090;
      --shadow:     0 4px 24px rgba(0,0,0,.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      transition: background .25s, color .25s;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      position: relative;
      z-index: 10;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    .header-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(108,99,255,.25);
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .clear-btn {
      font-size: 12px;
      color: var(--text2);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .clear-btn:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-dim); }

    .theme-btn {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background .15s, border-color .15s;
    }
    .theme-btn:hover { background: var(--surface); border-color: var(--accent); }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: calc(100vh - var(--header-h));
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg2);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      padding: 18px 18px 8px;
    }

    /* ── Upload zone ── */
    .upload-wrap { padding: 0 14px 14px; }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 22px 14px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--surface);
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .upload-icon { font-size: 26px; margin-bottom: 6px; }
    .upload-area p { color: var(--text2); font-size: 12px; }
    .upload-area p strong { color: var(--text); }
    .upload-area input[type="file"] { display: none; }

    .upload-area input[type="text"] {
      width: 100%;
      margin-top: 10px;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .upload-area input[type="text"]:focus { border-color: var(--accent); }

    .upload-btn-row { margin-top: 10px; display: flex; justify-content: center; }

    /* ── Progress bar ── */
    .progress-wrap {
      margin: 8px 14px 0;
      display: none;
    }
    .progress-wrap.visible { display: block; }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-h));
      border-radius: 4px;
      transition: width .3s ease;
    }
    .progress-label {
      font-size: 11px;
      color: var(--text2);
      text-align: center;
      margin-top: 4px;
    }

    .upload-status {
      margin: 6px 14px 0;
      font-size: 12px;
      min-height: 16px;
      text-align: center;
    }
    .upload-status.ok  { color: var(--success); }
    .upload-status.err { color: var(--danger); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(108,99,255,.3);
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 6px;
    }
    .btn-danger:hover:not(:disabled) { background: var(--danger-dim); border-color: var(--danger); }

    /* ── Documents list ── */
    .docs-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 14px;
    }
    .docs-list::-webkit-scrollbar { width: 3px; }
    .docs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    .doc-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

    .doc-icon {
      width: 30px; height: 30px;
      background: var(--accent-dim);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .doc-info { flex: 1; min-width: 0; }
    .doc-title {
      font-weight: 500;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-meta { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .empty-state {
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      padding: 28px 0;
    }
    .empty-state-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome ── */
    .chat-welcome {
      margin: auto;
      text-align: center;
      color: var(--text2);
      max-width: 380px;
    }
    .welcome-icon {
      width: 56px; height: 56px;
      background: var(--accent-dim);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
      border: 1px solid rgba(108,99,255,.25);
    }
    .chat-welcome h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .chat-welcome p  { font-size: 13px; line-height: 1.7; }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 780px;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.7;
      font-size: 14px;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
      box-shadow: 0 2px 12px rgba(108,99,255,.25);
    }
    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .msg-meta { font-size: 11px; color: var(--text2); padding: 0 4px; }

    /* ── Sources (Perplexity-style) ── */
    .sources-section { display: flex; flex-direction: column; gap: 8px; }

    .sources-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text2);
    }

    .sources-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      width: 210px;
      cursor: default;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
    }
    .source-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .source-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .source-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .source-excerpt {
      font-size: 11px;
      color: var(--text2);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
      transition: all .2s;
    }
    .source-card.expanded { width: 100%; }
    .source-card.expanded .source-excerpt {
      -webkit-line-clamp: unset;
      display: block;
    }
    .source-toggle {
      font-size: 10px;
      color: var(--accent);
      cursor: pointer;
      margin-top: 5px;
      user-select: none;
    }
    .source-toggle:hover { text-decoration: underline; }

    .source-sim {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── Thinking ── */
    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      width: fit-content;
    }
    .thinking span {
      width: 6px; height: 6px;
      background: var(--text2);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .15s; }
    .thinking span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg2);
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-bar textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 11px 16px;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.55;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-bar textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .input-bar textarea::placeholder { color: var(--text2); }

    .topk-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .topk-label { font-size: 10px; color: var(--text2); font-weight: 600; letter-spacing: .5px; }
    .topk-wrap input[type="number"] {
      width: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      text-align: center;
      padding: 7px 4px;
      outline: none;
      transition: border-color .2s;
    }
    .topk-wrap input[type="number"]:focus { border-color: var(--accent); }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(108,99,255,.3);
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-h); }
    .send-btn:active:not(:disabled) { transform: scale(.94); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; }
    .send-btn svg { flex-shrink: 0; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="logo-icon">🔍</div>
    <h1>Mini RAG</h1>
    <span class="header-badge">ESN</span>
  </div>
  <div class="header-actions">
    <button class="clear-btn" id="clearBtn">Effacer la conversation</button>
    <button class="theme-btn" id="themeBtn" title="Changer le thème">🌙</button>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="section-label">Importer un document</div>

    <div class="upload-wrap">
      <div class="upload-area" id="dropZone">
        <div class="upload-icon">📄</div>
        <p><strong>Glisser-déposer</strong> ou cliquer pour parcourir</p>
        <p style="margin-top:3px">PDF, TXT, MD acceptés</p>
        <input type="file" id="fileInput" accept=".pdf,.txt,.md" />
        <input type="text" id="titleInput" placeholder="Titre personnalisé (optionnel)" />
        <div class="upload-btn-row">
          <button class="btn btn-primary" id="uploadBtn" disabled>Importer</button>
        </div>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">0%</div>
    </div>
    <div class="upload-status" id="uploadStatus"></div>

    <div class="section-label">Documents</div>
    <div class="docs-list" id="docsList">
      <div class="empty-state">
        <div class="empty-state-icon">🗂️</div>
        Aucun document.
      </div>
    </div>
  </aside>

  <!-- ── Chat ── -->
  <section class="chat-panel">
    <div class="messages" id="messages">
      <div class="chat-welcome" id="welcomeMsg">
        <div class="welcome-icon">💬</div>
        <h2>Interrogez vos documents</h2>
        <p>Importez un document à gauche, puis posez votre question ci-dessous.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="questionInput" rows="1" placeholder="Posez votre question…"></textarea>
      </div>
      <div class="topk-wrap">
        <span class="topk-label">TOP K</span>
        <input type="number" id="topK" value="5" min="1" max="20" />
      </div>
      <button class="send-btn" id="askBtn" title="Envoyer">
        <span id="askBtnInner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </span>
      </button>
    </div>
  </section>

</div>

<script>
  const API = '';

  /* ── helpers ── */
  const qs = (s) => document.querySelector(s);

  function setStatus(msg, type = '') {
    const el = qs('#uploadStatus');
    el.textContent = msg;
    el.className = 'upload-status ' + type;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  /* ── Theme ── */
  const themeBtn = qs('#themeBtn');
  const savedTheme = localStorage.getItem('rag-theme') || 'dark';
  applyTheme(savedTheme);

  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('rag-theme', next);
  });

  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  }

  /* ── File selection ── */
  const dropZone  = qs('#dropZone');
  const fileInput = qs('#fileInput');
  const uploadBtn = qs('#uploadBtn');
  let selectedFile = null;

  dropZone.addEventListener('click', (e) => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') fileInput.click();
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) selectFile(fileInput.files[0]);
  });
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
  });

  function selectFile(file) {
    selectedFile = file;
    dropZone.querySelector('.upload-icon').textContent = '📎';
    dropZone.querySelector('p').innerHTML = `<strong>${escapeHtml(file.name)}</strong>`;
    uploadBtn.disabled = false;
    setStatus('');
  }

  /* ── Upload with XHR progress ── */
  uploadBtn.addEventListener('click', () => {
    if (!selectedFile) return;
    uploadBtn.disabled = true;
    setStatus('');

    const progressWrap = qs('#progressWrap');
    const progressFill = qs('#progressFill');
    const progressLabel = qs('#progressLabel');

    progressWrap.classList.add('visible');
    progressFill.style.width = '0%';
    progressLabel.textContent = '0%';

    const form = new FormData();
    form.append('file', selectedFile);
    const title = qs('#titleInput').value.trim();
    if (title) form.append('title', title);

    const xhr = new XMLHttpRequest();

    const uploadSteps = [
      { at: 0,  label: 'Envoi du fichier…' },
      { at: 30, label: 'Extraction du texte…' },
      { at: 60, label: 'Vectorisation…' },
      { at: 90, label: 'Sauvegarde…' },
    ];

    function getStepLabel(pct) {
      let label = uploadSteps[0].label;
      for (const s of uploadSteps) { if (pct >= s.at) label = s.label; }
      return label;
    }

    xhr.upload.addEventListener('progress', (e) => {
      if (!e.lengthComputable) return;
      const pct = Math.round((e.loaded / e.total) * 100);
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `${pct}% — ${getStepLabel(pct)}`;
    });

    xhr.addEventListener('load', () => {
      progressFill.style.width = '100%';
      progressLabel.textContent = '100% — Terminé !';
      setTimeout(() => progressWrap.classList.remove('visible'), 800);

      if (xhr.status >= 200 && xhr.status < 300) {
        let data;
        try { data = JSON.parse(xhr.responseText); } catch { data = {}; }
        setStatus(`✓ ${data.chunk_count ?? '?'} extraits indexés`, 'ok');
        resetUpload();
        loadDocuments();
      } else {
        let detail = 'Échec de l\'importation';
        try { detail = JSON.parse(xhr.responseText).detail || detail; } catch {}
        setStatus(detail, 'err');
        uploadBtn.disabled = false;
      }
    });

    xhr.addEventListener('error', () => {
      progressWrap.classList.remove('visible');
      setStatus('Erreur réseau.', 'err');
      uploadBtn.disabled = false;
    });

    xhr.open('POST', `${API}/upload`);
    xhr.send(form);
  });

  function resetUpload() {
    selectedFile = null;
    fileInput.value = '';
    qs('#titleInput').value = '';
    dropZone.querySelector('.upload-icon').textContent = '📄';
    dropZone.querySelector('p').innerHTML = '<strong>Glisser-déposer</strong> ou cliquer pour parcourir';
    uploadBtn.disabled = true;
  }

  /* ── Documents ── */
  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const docs = await res.json();
      renderDocuments(docs);
    } catch {
      qs('#docsList').innerHTML = '<div class="empty-state">Impossible de charger les documents.</div>';
    }
  }

  function renderDocuments(docs) {
    const list = qs('#docsList');
    if (!docs.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🗂️</div>Aucun document.</div>';
      return;
    }
    list.innerHTML = docs.map(doc => `
      <div class="doc-card">
        <div class="doc-icon">📄</div>
        <div class="doc-info">
          <div class="doc-title" title="${escapeHtml(doc.title)}">${escapeHtml(doc.title)}</div>
          <div class="doc-meta">${escapeHtml(doc.filename)} · ${formatDate(doc.created_at)}</div>
        </div>
        <button class="btn btn-danger" data-id="${doc.id}">Supprimer</button>
      </div>
    `).join('');

    list.querySelectorAll('.btn-danger').forEach(btn => {
      btn.addEventListener('click', () => deleteDocument(btn.dataset.id, btn));
    });
  }

  async function deleteDocument(id, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/documents/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      loadDocuments();
    } catch {
      btn.disabled = false;
      alert('Échec de la suppression du document.');
    }
  }

  /* ── Conversation history ── */
  const STORAGE_KEY = 'rag-conversation';

  function saveHistory(history) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch {}
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
  }

  let history = loadHistory();

  /* ── Chat ── */
  const textarea = qs('#questionInput');
  const askBtn   = qs('#askBtn');
  const messagesEl = qs('#messages');

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  askBtn.addEventListener('click', sendQuestion);

  qs('#clearBtn').addEventListener('click', () => {
    history = [];
    saveHistory(history);
    messagesEl.innerHTML = '';
    messagesEl.innerHTML = `
      <div class="chat-welcome" id="welcomeMsg">
        <div class="welcome-icon">💬</div>
        <h2>Interrogez vos documents</h2>
        <p>Importez un document à gauche, puis posez votre question ci-dessous.</p>
      </div>`;
  });

  async function sendQuestion() {
    const question = textarea.value.trim();
    if (!question) return;

    clearWelcome();

    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    appendUserMsg(question, now);
    history.push({ role: 'user', text: question, time: now });

    textarea.value = '';
    textarea.style.height = 'auto';
    setAsking(true);

    const thinkingEl = appendThinking();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, top_k: parseInt(qs('#topK').value) || 5 }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Échec de la requête');
      thinkingEl.remove();
      const answerTime = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      appendAnswerMsg(data, answerTime);
      history.push({ role: 'assistant', answer: data.answer, sources: data.sources, time: answerTime });
      saveHistory(history);
    } catch (err) {
      thinkingEl.remove();
      appendUserMsg(`Erreur : ${err.message}`, '', 'assistant');
    } finally {
      setAsking(false);
    }
  }

  function setAsking(on) {
    askBtn.disabled = on;
    qs('#askBtnInner').innerHTML = on
      ? '<div class="spinner"></div>'
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;
  }

  function clearWelcome() {
    const w = qs('#welcomeMsg');
    if (w) w.remove();
  }

  function appendUserMsg(text, time, role = 'user') {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = `
      <div class="msg-bubble">${escapeHtml(text)}</div>
      ${time ? `<div class="msg-meta">${time}</div>` : ''}
    `;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function appendThinking() {
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function appendAnswerMsg(data, time) {
    const el = document.createElement('div');
    el.className = 'msg assistant';

    const sourcesHtml = data.sources && data.sources.length
      ? `<div class="sources-section">
          <div class="sources-label">Sources</div>
          <div class="sources-grid">
            ${data.sources.map((s, i) => `
              <div class="source-card" data-index="${i}">
                <div class="source-num">${i + 1}</div>
                <div class="source-title" title="${escapeHtml(s.document_title)}">${escapeHtml(s.document_title)}</div>
                <div class="source-excerpt">${escapeHtml(s.content_excerpt)}</div>
                <div class="source-sim">${(s.similarity * 100).toFixed(1)}% de similarité</div>
                <div class="source-toggle">Voir plus ▾</div>
              </div>`).join('')}
          </div>
        </div>`
      : '';

    el.innerHTML = `
      <div class="msg-bubble">${escapeHtml(data.answer)}</div>
      ${sourcesHtml}
      ${time ? `<div class="msg-meta">${time}</div>` : ''}
    `;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    el.querySelectorAll('.source-card').forEach(card => {
      card.addEventListener('click', () => {
        const expanded = card.classList.toggle('expanded');
        card.querySelector('.source-toggle').textContent = expanded ? 'Voir moins ▴' : 'Voir plus ▾';
      });
    });
  }

  /* ── Restore history on load ── */
  function restoreHistory() {
    if (!history.length) return;
    clearWelcome();
    history.forEach(entry => {
      if (entry.role === 'user') {
        appendUserMsg(entry.text, entry.time);
      } else {
        appendAnswerMsg({ answer: entry.answer, sources: entry.sources || [] }, entry.time);
      }
    });
  }

  /* ── Init ── */
  loadDocuments();
  restoreHistory();
</script>
</body>
</html>
