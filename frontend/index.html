<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #6c63ff;
      --accent-h:  #857dff;
      --danger:    #ff4f4f;
      --text:      #e2e4ed;
      --muted:     #6b7080;
      --success:   #3ecf8e;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 600; letter-spacing: .3px; }
    header span { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 20px; }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto 1fr;
      gap: 0;
      height: calc(100vh - 61px);
    }

    /* ── Sidebar ── */
    .sidebar {
      grid-row: 1 / 3;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      padding: 16px 20px 10px;
    }

    /* ── Upload ── */
    .upload-area {
      margin: 0 16px 16px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,.05);
    }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-area p { color: var(--muted); font-size: 13px; }
    .upload-area p strong { color: var(--text); }
    .upload-area input[type="text"] {
      width: 100%;
      margin-top: 12px;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .upload-area input[type="text"]:focus { border-color: var(--accent); }
    .upload-area input[type="file"] { display: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; font-size: 12px; }
    .btn-danger:hover:not(:disabled) { background: rgba(255,79,79,.1); }

    .upload-btn-row { margin-top: 12px; display: flex; justify-content: center; }

    .upload-status {
      margin: 0 16px 10px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }
    .upload-status.ok  { color: var(--success); }
    .upload-status.err { color: var(--danger); }

    /* ── Documents list ── */
    .docs-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .docs-list::-webkit-scrollbar { width: 4px; }
    .docs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .doc-info { flex: 1; min-width: 0; }
    .doc-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .doc-badge {
      font-size: 10px;
      background: rgba(108,99,255,.15);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }

    /* ── Chat ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; flex-direction: column; gap: 6px; max-width: 820px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.65;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .source-chip {
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      color: var(--muted);
      cursor: default;
      position: relative;
    }
    .source-chip:hover .source-tooltip { display: block; }
    .source-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      width: 260px;
      font-size: 11px;
      color: var(--text);
      z-index: 10;
      line-height: 1.5;
      white-space: normal;
      pointer-events: none;
    }

    .chat-welcome {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }
    .chat-welcome h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color .2s;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }

    .top-k-label { font-size: 11px; color: var(--muted); white-space: nowrap; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .top-k-label input[type="number"] {
      width: 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      text-align: center;
      padding: 6px 4px;
      outline: none;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      width: fit-content;
    }
    .thinking span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .15s; }
    .thinking span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  </style>
</head>
<body>

<header>
  <h1>Mini RAG</h1>
  <span>ESN</span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="section-title">Upload document</div>

    <div class="upload-area" id="dropZone">
      <div class="upload-icon">📄</div>
      <p><strong>Drag & drop</strong> or click to browse</p>
      <p style="margin-top:4px">PDF, TXT, MD accepted</p>
      <input type="file" id="fileInput" accept=".pdf,.txt,.md" />
      <input type="text" id="titleInput" placeholder="Custom title (optional)" />
      <div class="upload-btn-row">
        <button class="btn btn-primary" id="uploadBtn" disabled>Upload</button>
      </div>
    </div>
    <div class="upload-status" id="uploadStatus"></div>

    <div class="section-title">Documents</div>
    <div class="docs-list" id="docsList">
      <div class="empty-state">No documents yet.</div>
    </div>
  </aside>

  <!-- ── Chat ── -->
  <section class="chat-panel">
    <div class="messages" id="messages">
      <div class="chat-welcome">
        <h2>Ask your documents</h2>
        <p>Upload a document on the left, then ask anything below.</p>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="questionInput" rows="1" placeholder="Ask a question…"></textarea>
      <label class="top-k-label">
        top_k
        <input type="number" id="topK" value="5" min="1" max="20" />
      </label>
      <button class="btn btn-primary" id="askBtn">
        <span id="askBtnLabel">Ask</span>
      </button>
    </div>
  </section>

</div>

<script>
  const API = '';   // same origin

  /* ── helpers ── */
  const qs = (s) => document.querySelector(s);

  function setStatus(msg, type = '') {
    const el = qs('#uploadStatus');
    el.textContent = msg;
    el.className = 'upload-status ' + type;
  }

  /* ── file selection ── */
  const dropZone   = qs('#dropZone');
  const fileInput  = qs('#fileInput');
  const uploadBtn  = qs('#uploadBtn');
  let selectedFile = null;

  dropZone.addEventListener('click', (e) => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') fileInput.click();
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) selectFile(fileInput.files[0]);
  });

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
  });

  function selectFile(file) {
    selectedFile = file;
    dropZone.querySelector('.upload-icon').textContent = '📎';
    dropZone.querySelector('p').innerHTML = `<strong>${file.name}</strong>`;
    uploadBtn.disabled = false;
    setStatus('');
  }

  /* ── upload ── */
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    uploadBtn.disabled = true;
    setStatus('Uploading…');

    const form = new FormData();
    form.append('file', selectedFile);
    const title = qs('#titleInput').value.trim();
    if (title) form.append('title', title);

    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      setStatus(`✓ ${data.chunk_count} chunks indexed`, 'ok');
      resetUpload();
      loadDocuments();
    } catch (err) {
      setStatus(err.message, 'err');
      uploadBtn.disabled = false;
    }
  });

  function resetUpload() {
    selectedFile = null;
    fileInput.value = '';
    qs('#titleInput').value = '';
    dropZone.querySelector('.upload-icon').textContent = '📄';
    dropZone.querySelector('p').innerHTML = '<strong>Drag & drop</strong> or click to browse';
    uploadBtn.disabled = true;
  }

  /* ── documents list ── */
  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const docs = await res.json();
      renderDocuments(docs);
    } catch {
      qs('#docsList').innerHTML = '<div class="empty-state">Failed to load documents.</div>';
    }
  }

  function renderDocuments(docs) {
    const list = qs('#docsList');
    if (!docs.length) {
      list.innerHTML = '<div class="empty-state">No documents yet.</div>';
      return;
    }
    list.innerHTML = docs.map(doc => `
      <div class="doc-card" data-id="${doc.id}">
        <div class="doc-info">
          <div class="doc-title" title="${doc.title}">${doc.title}</div>
          <div class="doc-meta">
            ${doc.filename} &nbsp;·&nbsp;
            <span class="doc-badge">${doc.chunk_count} chunks</span>
          </div>
          <div class="doc-meta">${formatDate(doc.created_at)}</div>
        </div>
        <button class="btn btn-danger" data-id="${doc.id}">Delete</button>
      </div>
    `).join('');

    list.querySelectorAll('.btn-danger').forEach(btn => {
      btn.addEventListener('click', () => {
        deleteDocument(btn.dataset.id, btn);
      });
    });
  }

  async function deleteDocument(id, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/documents/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      loadDocuments();
    } catch {
      btn.disabled = false;
      alert('Failed to delete document.');
    }
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' });
  }

  /* ── chat ── */
  const textarea = qs('#questionInput');
  const askBtn   = qs('#askBtn');
  const messages = qs('#messages');

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  askBtn.addEventListener('click', sendQuestion);

  async function sendQuestion() {
    const question = textarea.value.trim();
    if (!question) return;

    clearWelcome();
    appendMessage('user', question);
    textarea.value = '';
    textarea.style.height = 'auto';
    askBtn.disabled = true;
    qs('#askBtnLabel').innerHTML = '<div class="spinner"></div>';

    const thinkingEl = appendThinking();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, top_k: parseInt(qs('#topK').value) || 5 }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Request failed');
      thinkingEl.remove();
      appendAnswer(data);
    } catch (err) {
      thinkingEl.remove();
      appendMessage('assistant', `Error: ${err.message}`);
    } finally {
      askBtn.disabled = false;
      qs('#askBtnLabel').textContent = 'Ask';
    }
  }

  function clearWelcome() {
    const w = messages.querySelector('.chat-welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function appendThinking() {
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function appendAnswer(data) {
    const el = document.createElement('div');
    el.className = 'msg assistant';

    const sourcesHtml = data.sources.length
      ? `<div class="sources">
          ${data.sources.map(s => `
            <span class="source-chip">
              ${escapeHtml(s.document_title)}
              <span class="source-tooltip">
                <strong>${escapeHtml(s.document_title)}</strong><br/>
                ${escapeHtml(s.content_excerpt)}…<br/>
                <span style="color:var(--accent)">similarity: ${(s.similarity * 100).toFixed(1)}%</span>
              </span>
            </span>`).join('')}
        </div>`
      : '';

    el.innerHTML = `
      <div class="msg-bubble">${escapeHtml(data.answer)}</div>
      ${sourcesHtml}
    `;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  /* ── init ── */
  loadDocuments();
</script>
</body>
</html>
